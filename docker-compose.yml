services:
  mysql:
    image: 'mysql:8.0'
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: my_database
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - '3306:3306'
    volumes:
      # - 'db_data:/var/lib/mysql'
      # - ./init-db:/docker-entrypoint-initdb.d
      - 'db_data:/var/lib/mysql'
      # Mount the folder contents directly
      - ./init-db:/docker-entrypoint-initdb.d:ro
  backend:
    build: ./backend
    restart: always
    ports:
      - '8001:8000'
    volumes:
      - './backend:/var/www/html'
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=my_database
      - DB_USERNAME=dev_user
      - DB_PASSWORD=dev_password
    depends_on:
      - mysql
  frontend:
    build: ./frontend
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - './frontend:/frontend'
      - /frontend/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - 'VITE_CODESPACE_NAME=${CODESPACE_NAME}'
      - 'VITE_GITHUB_CODESPACES=${GITHUB_CODESPACES}'
    depends_on:
      - backend
volumes:
  db_data: null